<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deutschkurs für Katzen</title>

<style>
body {font-family: Arial;margin:0;background:#f4f4f4;overflow-x:hidden;}
header {background:#ff9800;color:white;text-align:center;padding:25px;}
.badge {background:gold;padding:5px 10px;border-radius:6px;font-size:12px;}

/* NAVIGATION */
nav {
  background:white;
  padding:10px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #ddd;
  position:sticky;
  top:0;
  z-index:1000;
}

nav .logo {
  font-weight:bold;
  color:#ff9800;
  font-size:20px;
}

nav ul {
  list-style:none;
  display:flex;
  gap:20px;
  margin:0;
  padding:0;
}

nav ul li a {
  text-decoration:none;
  color:#333;
  font-weight:bold;
}

nav ul li a:hover {
  color:#ff9800;
}

/* Hamburger Button */
.hamburger {
  display:none;
  flex-direction:column;
  cursor:pointer;
}

.hamburger div {
  width:25px;
  height:3px;
  background:#333;
  margin:4px 0;
  transition:0.3s;
}

/* Mobile Menu */
@media(max-width:768px){
  nav ul {
    position:absolute;
    top:60px;
    right:0;
    background:white;
    flex-direction:column;
    width:200px;
    display:none;
    padding:15px;
    border-left:1px solid #ddd;
    border-bottom:1px solid #ddd;
  }
  nav ul.show {
    display:flex;
  }
  .hamburger {
    display:flex;
  }
}
